<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Project Proposal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Index Theme Background -->
    <div class="theme-bg">
        <div class="theme-bg__image"></div>
        <div class="theme-bg__blur"></div>
        <div class="theme-bg__gradient"></div>
    </div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="dash-sidebar">
            <div class="sidebar-brand">
                <h1 class="brand-title" style="font-size: 1.5rem;">
                    <span class="brand-word brand-word--project">Project</span>
                    <br><span class="brand-word brand-word--board">Board</span>
                </h1>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>
                    Team Building
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" /></svg>
                    Mentor Selection
                </a>
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="9" y1="21" x2="9" y2="9" /></svg>
                    Project Proposal
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dash-main">
            <header class="dash-header">
                <div>
                    <h2 class="dash-title">Beta Lab Core Team</h2>
                    <p class="dash-subtitle">Mentor: Prof. Jane Smith</p>
                </div>
                <div class="status-badge status-badge--active">
                    <span class="status-dot"></span> Active
                </div>
            </header>

            <div class="dash-content">
                <div class="glass-card">
                    <h3 class="card-title">Submit Project Proposal</h3>
                    <p class="card-text">Your group has been approved! Submit your project details below.</p>
                    
                    <form class="login-form mt-24">
                        <div class="input-group">
                            <label for="projectTitle" class="input-label">Project Title</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                                </svg>
                                <input type="text" id="projectTitle" name="projectTitle" placeholder="Enter your project title" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="projectFunc" class="input-label">Project Functionality</label>
                            <div class="input-wrapper">
                                <textarea id="projectFunc" name="projectFunc" class="glass-textarea" placeholder="Describe the core functionality of your project..." rows="5" required></textarea>
                            </div>
                        </div>

                        <button type="submit" class="login-btn mt-24">
                            <span class="btn-text">Submit Proposal</span>
                            <span class="btn-arrow">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12" />
                                    <polyline points="12 5 19 12 12 19" />
                                </svg>
                            </span>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
